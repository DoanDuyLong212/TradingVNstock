name: Daily VNStock Pipeline

on:
  schedule:
    - cron: '0 8 * * 1-5'

  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL}}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN}}
        run: |
          python Data_Retriever/daily_pipeline.py
          python backend/Stock_Filter/pipelines/initialize_cache.py
          python backend/services/signal_service.py